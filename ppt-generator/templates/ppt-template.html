<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}}</title>
    <style>
        :root {
            --bg-color-1: #0f172a;
            --bg-color-2: #1e1b4b;
            --accent-cyan: #06b6d4;
            --accent-green: #10b981;
            --accent-warning: #f59e0b;
            --accent-danger: #f43f5e;
            --accent-purple: #8b5cf6;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: radial-gradient(circle at center, var(--bg-color-2) 0%, var(--bg-color-1) 100%);
            color: var(--text-main);
            overflow: hidden;
            position: relative;
            height: 100vh;
        }
        #particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .slide {
            display: none;
            width: 100vw;
            height: 100vh;
            padding: 40px 8vw;
            position: relative;
            z-index: 1;
            opacity: 0;
            transition: opacity 0.6s ease;
        }
        .slide.active {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 1;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        h1 { font-size: clamp(3rem, 5vw, 4.5rem); margin-bottom: 16px; text-align: center; letter-spacing: 2px; }
        h2 { font-size: clamp(2rem, 3vw, 2.8rem); margin-bottom: 30px; text-align: center; letter-spacing: 1px; color: var(--accent-cyan); text-shadow: 0 0 20px rgba(6, 182, 212, 0.4); }
        .subtitle { font-size: 1.2rem; color: var(--text-muted); margin-bottom: 30px; text-align: center; font-weight: 300; letter-spacing: 1px; }
        .feature-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px 40px;
            list-style: none;
            padding: 20px;
        }
        .feature-grid li {
            font-size: clamp(1.1rem, 1.5vw, 1.4rem);
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            border: 1px solid transparent;
            transition: all 0.3s ease;
            opacity: 0;
            animation: slideInRight 0.6s ease-out forwards;
        }
        .feature-grid li:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(6, 182, 212, 0.3);
            transform: translateX(10px);
        }
        .feature-grid li:nth-child(1) { animation-delay: 0.1s; }
        .feature-grid li:nth-child(2) { animation-delay: 0.2s; }
        .feature-grid li:nth-child(3) { animation-delay: 0.3s; }
        .feature-grid li:nth-child(4) { animation-delay: 0.4s; }
        .feature-grid li:nth-child(5) { animation-delay: 0.5s; }
        .feature-grid li:nth-child(6) { animation-delay: 0.6s; }
        .feature-grid li:nth-child(7) { animation-delay: 0.7s; }
        .feature-grid li:nth-child(8) { animation-delay: 0.8s; }
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(-30px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .glass-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s;
            width: 100%;
        }
        .glass-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 60px rgba(6, 182, 212, 0.1), inset 0 1px 0 rgba(255,255,255,0.2);
            border-color: rgba(6, 182, 212, 0.3);
        }
        .mermaid-wrapper {
            width: 100%;
            max-width: 1000px;
            margin: 10px auto;
            padding: 30px;
            background: rgba(15, 23, 42, 0.6);
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 500px;
            max-height: 65vh;
            overflow: visible;
        }
        .mermaid-wrapper svg {
            max-width: 100%;
            max-height: 60vh;
            height: auto;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }
        .gradient-text { background: linear-gradient(135deg, #e0e7ff 0%, #38bdf8 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .success { color: var(--accent-green); text-shadow: 0 0 10px rgba(16, 185, 129, 0.5); }
        .page-number { position: absolute; bottom: 30px; left: 40px; font-size: 16px; color: var(--text-muted); letter-spacing: 2px; font-family: monospace; z-index: 100; }
        .progress-container { position: fixed; bottom: 0; left: 0; width: 100%; height: 4px; background: rgba(255,255,255,0.05); z-index: 1001; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent-purple), var(--accent-cyan)); box-shadow: 0 0 15px var(--accent-cyan); transition: width 0.4s ease-out; }
        .controls-hint { position: fixed; bottom: 30px; right: 40px; font-size: 14px; color: var(--text-muted); display: flex; align-items: center; gap: 15px; z-index: 100; }
        .key { background: rgba(255,255,255,0.1); padding: 4px 10px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.2); font-family: monospace; box-shadow: 0 2px 0 rgba(0,0,0,0.2); }
    </style>
</head>
<body>
    <canvas id="particles"></canvas>
    <div class="progress-container"><div class="progress-bar" id="progress"></div></div>
    
    <!-- SLIDES_PLACEHOLDER -->
    
    <div class="page-number" id="pageCounter">1 / {{TOTAL_SLIDES}}</div>
    <div class="controls-hint">
        <span>切换：<span class="key">←</span> <span class="key">→</span></span>
        <span>全屏：<span class="key">F11</span></span>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
    <script>
        mermaid.initialize({
            startOnLoad: false,
            theme: 'base',
            themeVariables: {
                background: 'transparent',
                primaryColor: 'rgba(6, 182, 212, 0.1)',
                primaryTextColor: '#f8fafc',
                primaryBorderColor: '#06b6d4',
                lineColor: '#8b5cf6',
                secondaryColor: 'rgba(139, 92, 246, 0.2)',
                tertiaryColor: '#1e1b4b',
                fontFamily: "'Inter', sans-serif",
                fontSize: "16px"
            },
            flowchart: { curve: 'basis', padding: 25 },
            sequence: { actorMargin: 50, messageMargin: 40 },
            gantt: { barHeight: 30, barGap: 8 }
        });
        
        async function renderActiveMermaid(slideElement) {
            if (!slideElement) return;
            const preElement = slideElement.querySelector('pre.mermaid');
            if (preElement && preElement.getAttribute('data-processed') !== 'true') {
                const graphDefinition = preElement.textContent.trim();
                const id = 'mermaid-svg-' + Math.random().toString(36).substr(2, 9);
                try {
                    const { svg } = await mermaid.render(id, graphDefinition);
                    const container = document.createElement('div');
                    container.innerHTML = svg;
                    container.style.width = '100%';
                    container.style.display = 'flex';
                    container.style.justifyContent = 'center';
                    preElement.parentNode.replaceChild(container, preElement);
                } catch (e) {
                    console.error('Mermaid 渲染失败:', e);
                    preElement.innerHTML = `<span style="color:#f43f5e; font-weight:bold;">图表渲染失败：${e.message}</span>`;
                    preElement.style.display = 'block';
                }
            }
        }
        
        // 背景粒子动画
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();
        const particles = [];
        const particleCount = Math.min(Math.floor(window.innerWidth / 15), 80);
        const maxDistance = 150;
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = (Math.random() - 0.5) * 0.5;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width) this.x = 0;
                else if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                else if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = 'rgba(14, 165, 233, 0.5)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        for (let i = 0; i < particleCount; i++) particles.push(new Particle());
        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
                for (let j = i; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < maxDistance) {
                        const opacity = 1 - (distance / maxDistance);
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(139, 92, 246, ${opacity * 0.2})`;
                        ctx.lineWidth = 1;
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animateParticles);
        }
        animateParticles();
        
        // 幻灯片控制
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        const progress = document.getElementById('progress');
        const pageCounter = document.getElementById('pageCounter');
        const totalSlides = slides.length;
        
        function updateSlide() {
            slides.forEach((slide, index) => {
                slide.classList.remove('active');
                if (index === currentSlide) {
                    slide.classList.add('active');
                    setTimeout(() => renderActiveMermaid(slide), 50);
                }
            });
            const progressPercent = ((currentSlide + 1) / totalSlides) * 100;
            progress.style.width = `${progressPercent}%`;
            pageCounter.textContent = `${currentSlide + 1} / ${totalSlides}`;
        }
        
        function nextSlide() { if (currentSlide < totalSlides - 1) { currentSlide++; updateSlide(); } }
        function prevSlide() { if (currentSlide > 0) { currentSlide--; updateSlide(); } }
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => console.log(`全屏失败：${err.message}`));
            } else { document.exitFullscreen(); }
        }
        
        document.addEventListener('keydown', (e) => {
            if (['ArrowRight', ' ', 'Enter', 'ArrowDown'].includes(e.key)) { e.preventDefault(); nextSlide(); }
            else if (['ArrowLeft', 'ArrowUp'].includes(e.key)) { e.preventDefault(); prevSlide(); }
            else if (e.key === 'F11') { e.preventDefault(); toggleFullscreen(); }
        });
        
        let scrollTimeout = false;
        window.addEventListener('wheel', (e) => {
            if (scrollTimeout) return;
            if (e.deltaY > 0) nextSlide();
            else if (e.deltaY < 0) prevSlide();
            scrollTimeout = true;
            setTimeout(() => { scrollTimeout = false; }, 600);
        });
        
        let touchStartX = 0, touchEndX = 0;
        window.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; });
        window.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            if (touchEndX < touchStartX - 50) nextSlide();
            if (touchEndX > touchStartX + 50) prevSlide();
        });
        
        updateSlide();
    </script>
</body>
</html>
